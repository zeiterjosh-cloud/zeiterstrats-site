<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>
<body>

<canvas id="particles"></canvas>

<header class="navbar">
  <div class="logo">ZS</div>
  <nav>
    <a href="#">Home</a>
    <a href="#">Stream</a>
    <a href="#" class="active">Spin</a>
    <a href="#">Quests</a>
    <a href="#">Blog</a>
  </nav>

</header>

<section class="hero">
  <div class="hero-content">
    <h1>ZEITERSTRATS</h1>
    <h2>Master GTA Online</h2>
    <p>Strategy · Luck · Execution · Emotion</p>
    <button class="btn-primary pulse">Watch Live</button>
  </div>

  <div class="countdown-box neon-border">
    <h3>Next Stream</h3>
    <div id="countdown">00:00:00</div>
  </div>
</section>

<section class="dashboard">
  <div class="card tilt neon-border">
    <h3>Viewers</h3>
    <p class="big-number counter" data-target="1209">0</p>
  </div>

  <div class="card tilt neon-border">
    <h3>Followers</h3>

  </div>

    <h3>Spins Today</h3>
    <p class="big-number counter" data-target="428">0</p>
  </div>
</section>

<section class="spin-section">
  <div class="wheel-container">
    <div class="wheel" id="wheel"></div>
    <button class="btn-primary spin-btn">SPIN NOW</button>
  </div>
</section>
